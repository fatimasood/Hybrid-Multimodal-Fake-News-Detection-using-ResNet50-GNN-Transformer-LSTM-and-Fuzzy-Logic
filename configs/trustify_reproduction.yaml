experiment:
  name: trustify_strict_reproduction
  seed: 42
  runs: 10
  framework: "PyTorch 2.2 + CUDA 12.1"
  device: cuda
  deterministic: true

paths:
  raw_data_dir: data/raw
  processed_dir: data/processed
  checkpoints_dir: checkpoints
  logs_dir: logs
  embedding_path: null

dataset:
  paper_download_url: "https://www.kaggle.com/datasets/sudishbasnet/truthseekertwitterdataset2023"
  kaggle_slug: "sudishbasnet/truthseekertwitterdataset2023"
  active_dataset: twitter
  text_column: text
  image_column: image_path
  caption_column: caption
  label_column: label
  label_mapping:
    fake: 0
    real: 1
  split:
    train: 0.80
    validation: 0.10
    test: 0.10
    stratify: true
    randomized: true
  paper_table5_counts:
    twitter: {total: 17000, train: 13600, validation: 1700, test: 1700}
    buzzfeed: {total: 220, train: 176, validation: 22, test: 22}
    politifact: {total: 3565, train: 2852, validation: 357, test: 356}

preprocessing:
  text:
    lowercase: true
    remove_stopwords: true
    remove_punctuation: true
    stemming: true
    lemmatization: true
    tokenizer: whitespace_after_cleaning
    max_sequence_length: 256
    padding: post
    truncation: post
    embedding:
      type: glove_or_word2vec_as_available
      dimension: 300
      trainable: true
  image:
    resize: [224, 224]
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

models:
  text_lstm:
    optimizer: Adam
    batch_size: 20
    epochs: 20
    activation: sigmoid
    initial_learning_rate: 0.005
    gradient_threshold: 1.0
    learn_rate_drop_factor: 0.2
    hidden_dim: 128
    num_layers: 1
    dropout: 0.0
  image:
    resnet: resnet50
    weights: ImageNet
    extracted_layer: avgpool
    avgpool_dim: 2048
    graph_nodes: 16
    node_feature_dim: 128
    adjacency:
      non_diagonal_initial_value: 1.0
      learned_relation: sigmoid_conv1d_on_absolute_node_difference
    gnn:
      message_passing_steps: 1
      activation_vertex: tanh
      activation_hidden: relu
    transformer:
      encoder_layers: 3
      decoder_layers: 3
      attention_heads: 8
      embedding_dim: 128
      feedforward_dim: 512
      dropout: 0.1
      max_caption_length: 32
      decoding: greedy

fuzzy:
  enabled_inputs: [text_confidence, image_confidence, caption_text_similarity]
  linguistic_variables: [Low, Medium, High]
  membership_family: gaussian
  defuzzification: centroid
  mfce_grid_points: 41
  threshold_initialization: heuristic_from_validation_distribution
  ga:
    enabled: true
    population_size: 24
    generations: 20
    mutation_rate: 0.08
  output_centroids:
    fake: 0.0
    real: 1.0
  rules:
    - {text: real, image: real, consequent: real, weight: 1.0}
    - {text: fake, image: real, consequent: fake, weight: 1.0}
    - {text: real, image: fake, consequent: fake, weight: 1.0}
    - {text: fake, image: fake, consequent: fake, weight: 1.0}
  decision_threshold: 0.5

evaluation:
  metrics: [accuracy, precision, recall, f1, confusion_matrix]
  average: binary
  positive_label: 1
  cross_validation:
    folds: 5
    reported_in_paper: false
  ablations: [text_only, image_only, hybrid_fis, hybrid_softmax, hybrid_mlp]

